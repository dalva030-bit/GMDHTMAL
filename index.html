<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HTMAL-GMD est2026 - Seeded</title>

<style>
body{
margin:0;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
color:#fff;
font-family:'Segoe UI',sans-serif;
overflow:hidden;
}

#menu{
position:absolute;
background:rgba(0,0,0,0.95);
padding:25px;
border:2px solid var(--accent);
border-radius:15px;
text-align:center;
z-index:20;
width:340px;
box-shadow:0 0 50px rgba(0,0,0,0.8);
}

.branding{
font-size:10px;
letter-spacing:2px;
color:var(--accent);
opacity:0.7;
margin-bottom:10px;
}

.group{
margin:10px 0;
text-align:left;
background:#111;
padding:8px;
border-radius:5px;
border:1px solid #333;
}

label{
display:block;
font-size:9px;
margin-bottom:3px;
color:var(--accent);
font-weight:bold;
text-transform:uppercase;
}

input,select{
width:100%;
background:#000;
color:#fff;
border:1px solid #444;
padding:4px;
cursor:pointer;
font-size:12px;
}

button{
background:var(--accent);
border:none;
padding:12px;
font-weight:bold;
cursor:pointer;
border-radius:5px;
margin-top:10px;
width:100%;
color:#000;
}

#progress-container{
width:800px;
height:8px;
background:#111;
border:1px solid var(--accent);
margin-bottom:5px;
border-radius:4px;
overflow:hidden;
visibility:hidden;
}

#progress-bar{
height:100%;
width:0%;
background:var(--accent);
}

canvas{
border:3px solid var(--accent);
background:#000;
visibility:hidden;
}

:root{
--accent:#0f0;
}

.ui{
width:800px;
display:flex;
justify-content:space-between;
margin-bottom:5px;
font-weight:bold;
visibility:hidden;
}

.portalGuide{
font-size:10px;
margin-top:10px;
text-align:left;
opacity:0.9;
}

.portalGuide span{
display:block;
margin:2px 0;
}
</style>
</head>

<body>

<div id="menu">
<div class="branding">HTMAL-GMD EST2026</div>

<div class="group">
<label>LEVEL SEED (Share this!)</label>
<input type="text" id="seedInput" placeholder="Enter any text...">
</div>

<div class="group">
<label>ICON COLOR</label>
<input type="color" id="colorPick" value="#00ff00">
</div>

<div class="group">
<label>GAME MODE</label>
<select id="modeSelect">
<option value="all">ALL (PORTALS)</option>
<option value="cube">CUBE</option>
<option value="ship">SHIP</option>
<option value="wave">WAVE</option>
<option value="ufo">UFO</option>
</select>
</div>

<div class="group">
<label>SPEED & LENGTH</label>
<input type="range" id="diffSlider" min="6" max="15" value="8">
<input type="range" id="lenSlider" min="1000" max="15000" value="4000" step="1000">
</div>

<div class="group">
<label>WAVE DIFFICULTY</label>
<input type="range" id="waveDiffSlider" min="1" max="10" value="5">
</div>

<div class="portalGuide">
<b>Portal Colors</b>
<span style="color:#00ff00">■ Green → Cube</span>
<span style="color:#00aaff">■ Blue → Ship</span>
<span style="color:#aa00ff">■ Purple → Wave</span>
<span style="color:#ffee00">■ Yellow → UFO</span>
</div>

<button id="startBtn">START LEVEL</button>
</div>

<div class="ui" id="gameUI">
<div>MODE: <span id="modeText" style="color:var(--accent)">CUBE</span></div>
<div>SCORE: <span id="score">0</span></div>
</div>

<div id="progress-container">
<div id="progress-bar"></div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');

const scoreEl=document.getElementById('score');
const modeEl=document.getElementById('modeText');
const progBar=document.getElementById('progress-bar');
const menu=document.getElementById('menu');

canvas.width=800;
canvas.height=400;
const GROUND_Y=320;

let state={
running:false,
mode:'cube',
modeLock:'all',
color:'#0f0',
speed:8,
score:0,
targetScore:4000,
seed:0,
isPressed:false,
trail:[],
obstacles:[],
buildings:[],
stars:[],
frame:0,
waveDifficulty:5,
particles:[]
};

const player={x:150,y:GROUND_Y,vy:0,size:30,rot:0};

function sRandom(){let x=Math.sin(state.seed++)*10000;return x-Math.floor(x);}
function genStars(){state.stars=[];for(let i=0;i<80;i++){state.stars.push({x:sRandom()*800,y:sRandom()*300,s:sRandom()*2});}}
function genCity(){state.buildings=[];for(let i=0;i<12;i++){state.buildings.push({x:i*80,w:50+sRandom()*50,h:80+sRandom()*180});}}

document.getElementById('startBtn').onclick=()=>{
let rawSeed=document.getElementById('seedInput').value||Math.random().toString();
state.seed=rawSeed.split('').reduce((a,b)=>{a=((a<<5)-a)+b.charCodeAt(0);return a&a;},0);
state.speed=parseInt(document.getElementById('diffSlider').value);
state.targetScore=parseInt(document.getElementById('lenSlider').value);
state.modeLock=document.getElementById('modeSelect').value;
state.color=document.getElementById('colorPick').value;
state.waveDifficulty=parseInt(document.getElementById('waveDiffSlider').value);
state.mode=state.modeLock==='all'?'cube':state.modeLock;
document.documentElement.style.setProperty('--accent',state.color);
state.running=true;
state.score=0; state.obstacles=[]; state.trail=[]; state.frame=0; state.particles=[];
player.y=GROUND_Y; player.vy=0; player.rot=0; player.waveDir=1;
genCity(); genStars();
menu.style.display='none';
canvas.style.visibility='visible';
document.getElementById('gameUI').style.visibility='visible';
document.getElementById('progress-container').style.visibility='visible';
loop();
};

function setInput(v){if(v && !state.isPressed && state.mode==='ufo') player.vy=-11; state.isPressed=v;}

window.onkeydown=(e)=>{if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') setInput(true);};
window.onkeyup=(e)=>{if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') setInput(false);};
canvas.onmousedown=()=>setInput(true);
canvas.onmouseup=()=>setInput(false);
window.onmousedown=()=>setInput(true);
window.onmouseup=()=>setInput(false);

function portalColor(mode){if(mode==="cube") return "#00ff00"; if(mode==="ship") return "#00aaff"; if(mode==="wave") return "#aa00ff"; if(mode==="ufo") return "#ffee00"; return "#fff";}

function spawn(){
if(state.frame%150===0 && state.modeLock==='all'){
const modes=['cube','ship','wave','ufo'].filter(m=>m!==state.mode);
let target=modes[Math.floor(sRandom()*modes.length)];
state.obstacles.push({x:900,y:GROUND_Y-80,w:50,h:120,type:'portal',target:target});
} else if(state.frame%Math.max(30,80-state.speed*3)===0){
if(state.mode==="cube"){state.obstacles.push({x:900,y:GROUND_Y,w:30,h:30,type:'spike'});}
else if(state.mode==="ship"){state.obstacles.push({x:900,y:sRandom()*200+40,w:35,h:35,type:'spike'});}
else if(state.mode==="wave"){
// Spawn vertical moving spikes
let count = state.waveDifficulty;
for(let i=0;i<count;i++){
    let obsHeight = 30 + sRandom()*30;
    let minY=50, maxY=canvas.height-50-obsHeight;
    let startY=minY+sRandom()*(maxY-minY);
    let speed=2+sRandom()*2;
    state.obstacles.push({x:900+i*150,y:startY,w:20,h:obsHeight,type:'spike',speedY:speed,minY:minY,maxY:maxY,dir:sRandom()>0.5?1:-1});
}
// Spawn wave portals
if(state.frame%300===0){
    const portalModes=['cube','ship','ufo'];
    portalModes.forEach((m,i)=>{
        state.obstacles.push({x:900+200*i,y:100+100*i,w:30,h:30,type:'portal',target:m});
    });
}
}
else if(state.mode==="ufo"){state.obstacles.push({x:900,y:sRandom()*180+80,w:30,h:30,type:'spike'});}
}
}

function spawnDeathParticles(x,y){for(let i=0;i<20;i++){state.particles.push({x:x,y:y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:20+Math.random()*10});}}

function showMenu(){state.running=false;canvas.style.visibility='hidden';document.getElementById('gameUI').style.visibility='hidden';document.getElementById('progress-container').style.visibility='hidden';menu.style.display='block';}

function loop(){
if(!state.running) return;
ctx.fillStyle='#000'; ctx.fillRect(0,0,800,400);
state.frame++; spawn();

ctx.fillStyle=state.color; state.stars.forEach(s=>{s.x-=state.speed*0.2; ctx.fillRect(s.x,s.y,s.s,s.s); if(s.x<0) s.x=800;});
state.buildings.forEach(b=>{b.x-=state.speed*0.4; ctx.strokeStyle='#222'; ctx.strokeRect(b.x,380-b.h,b.w,b.h); ctx.fillStyle=state.color; for(let wy=0;wy<b.h;wy+=30){for(let wx=0;wx<b.w;wx+=20){if(sRandom()>0.6){ctx.fillRect(b.x+wx+5,380-b.h+wy+5,6,6);}}} if(b.x+b.w<0) b.x=900;});

let pRatio=(state.score/state.targetScore)*100; progBar.style.width=Math.min(pRatio,100)+'%';
if(pRatio>=100){alert("HTMAL-GMD: COMPLETE!"); showMenu(); return;}

if(state.mode==='cube'){player.vy+=0.85;player.y+=player.vy;if(player.y>=GROUND_Y){player.y=GROUND_Y;player.vy=0;if(state.isPressed) player.vy=-14;player.rot=0;} else player.rot+=0.25;}
else if(state.mode==='ship'){player.vy+=state.isPressed?-1.0:1.0;player.vy*=0.92;player.y+=player.vy;player.rot=player.vy*0.08;}
else if(state.mode==='wave'){const waveSpeed=6;player.y += state.isPressed ? -waveSpeed : waveSpeed;player.rot = state.isPressed ? -0.7 : 0.7;}
else if(state.mode==='ufo'){player.vy+=0.75;player.y+=player.vy;player.rot+=0.1;if(player.y>=GROUND_Y){player.y=GROUND_Y;player.vy=0;}}

if(player.y<0 || player.y>canvas.height-30){spawnDeathParticles(player.x+15,player.y+15);showMenu();}

state.trail.push({x:player.x,y:player.y+15});if(state.trail.length>20) state.trail.shift();
ctx.beginPath(); ctx.strokeStyle=state.color; ctx.lineWidth=3;
state.trail.forEach((t,i)=>{t.x-=state.speed;if(i===0) ctx.moveTo(t.x,t.y);else ctx.lineTo(t.x,t.y);});
ctx.stroke();

state.obstacles.forEach((o,i)=>{
if(state.mode==='wave' && o.type==='spike'){o.y+=o.speedY*o.dir;if(o.y<o.minY||o.y+o.h>o.maxY) o.dir*=-1;}
o.x-=(state.mode==='wave'?state.speed:state.speed);
ctx.strokeStyle=o.type==='portal'?portalColor(o.target):state.color; ctx.strokeRect(o.x,o.y,o.w,o.h);
if(player.x<o.x+o.w && player.x+25>o.x && player.y<o.y+o.h && player.y+25>o.y){
if(o.type==='spike'){spawnDeathParticles(player.x+15,player.y+15);showMenu();}
else if(o.type==='portal'){state.mode=o.target; modeEl.innerText=state.mode.toUpperCase(); state.obstacles.splice(i,1);}
}
});

for(let i=state.particles.length-1;i>=0;i--){let p=state.particles[i]; p.x+=p.vx; p.y+=p.vy; p.life--; ctx.fillStyle=state.color; ctx.fillRect(p.x,p.y,3,3); if(p.life<=0) state.particles.splice(i,1);}

ctx.save(); ctx.translate(player.x+15,player.y+15); ctx.rotate(player.rot); ctx.strokeStyle=state.color; ctx.lineWidth=3;
if(state.mode==='cube'){ctx.strokeRect(-15,-15,30,30);ctx.strokeRect(-8,-8,16,16);}
else if(state.mode==='ship'){ctx.beginPath();ctx.moveTo(-22,12);ctx.lineTo(22,0);ctx.lineTo(-22,-12);ctx.lineTo(-12,0);ctx.closePath();ctx.stroke();}
else if(state.mode==='wave'){ctx.beginPath();ctx.moveTo(-18,-14);ctx.lineTo(20,0);ctx.lineTo(-18,14);ctx.lineTo(-6,0);ctx.closePath();ctx.stroke();ctx.fill();}
else if(state.mode==='ufo'){ctx.beginPath();ctx.arc(0,0,15,0,Math.PI,true);ctx.lineTo(-15,0);ctx.stroke();ctx.strokeRect(-18,0,36,8);}
ctx.restore();

state.score++; scoreEl.innerText=Math.floor(state.score/10);
requestAnimationFrame(loop);
}
</script>

</body>
</html>
